# Render Blueprint for the Canary reverse proxy.
#
# This defines ONLY the proxy service. The existing Astro static site that
# serves collinpfeifer.dev stays as-is; it just needs one rewrite rule added
# (in the Render Dashboard, or in its own blueprint) pointing /canary/* at this
# proxy's public URL. See README "Canary proxy" for the full wiring.
#
#   /canary/*  --(rewrite 200)-->  https://<this-service>.onrender.com/canary/*
#                                         |
#                                         v  (streaming, Host set, prefix kept)
#                            https://canary-collinpfeifer.fly.dev/canary/*

services:
  - type: web
    name: canary-proxy
    runtime: node          # Node 18+; proxy uses node:http/https only, no deps
    plan: free
    rootDir: .
    buildCommand: "true"   # zero dependencies to install
    startCommand: node proxy/server.mjs
    autoDeployTrigger: commit
    healthCheckPath: /canary
